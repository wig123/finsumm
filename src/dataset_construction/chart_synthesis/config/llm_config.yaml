# LLM配置文件
# 使用云雾AI作为统一提供商

providers:
  apiyi:
    base_url: "<YOUR_LLM_PROXY>/v1"
    api_key: "<YOUR_API_KEY>"
    sdk: "openai"

  yunwu:
    base_url: "<YOUR_LLM_PROXY>/v1"
    api_key: "<YOUR_API_KEY>"
    sdk: "openai"

# Pipeline各层使用的模型配置
pipeline_models:
  # Layer 1: Planner - 业务规划
  planner:
    provider: "yunwu"
    model: "claude-sonnet-4-5-20250929"
    temperature: 0.7
    max_tokens: 8000  # 增加到8000,为reasoning tokens留足空间

  # Layer 4: Coder - 代码生成
  coder:
    provider: "yunwu"
    model: "claude-sonnet-4-5-20250929"
    temperature: 0.6
    max_tokens: 8196

  # Layer 5: Narrator - 总结生成 (暂未实现)
  narrator:
    provider: "yunwu"
    model: "gpt-5"
    temperature: 0.5
    max_tokens: 1000

# 重试策略
retry_policy:
  max_retries: 3
  retry_delay: 2  # 秒
  exponential_backoff: true
  timeout: 60  # 秒
