# ============================================================================
# 强制约束（硬性规则）
# ============================================================================
hard_constraints:
  synthetic_allowed_shapes:
    - CS_1D
    - CS_ND
    - MATRIX
    - FLOW
    - GRAPH
  
  synthetic_forbidden_shapes:
    - TS_1D
    - TS_ND
    - TS_OHLC

  chart_requires_shape:
    # === OHLC 图表（必须真实OHLC数据）===
    candlestick: [TS_OHLC]
    candlestick_volume: [TS_OHLC]
    ohlc: [TS_OHLC]
    bollinger_bands: [TS_OHLC]
    ichimoku_cloud: [TS_OHLC]
    renko: [TS_OHLC]
    point_figure: [TS_OHLC]
    candlestick_indicator: [TS_OHLC]
    volume_profile: [TS_OHLC]
    market_depth: [TS_OHLC]
    # === 时间序列图表（真实时序数据）===
    line: [TS_1D, TS_ND]
    area: [TS_1D, TS_ND]
    bar_line_overlay: [TS_1D]
    line_band_overlay: [TS_1D]
    fan_chart: [TS_1D]
    errorbar: [TS_1D, CS_ND]
    # === 矩阵/热力图（需要二维数据）===
    heatmap: [MATRIX, CS_ND]
    heatmap_scatter: [MATRIX, CS_ND]  # 🔧 新增
    contour: [MATRIX]
    # === 横截面图表（需要分组/层级数据）===
    box: [CS_ND]  # 🔧 修复: 多组数据比较
    histogram: [CS_1D]  # 🔧 修复: 数值分布数据
    treemap: [CS_ND]
    waterfall: [CS_1D]
    pie: [CS_1D]
    bubble: [CS_ND]
    radar: [CS_ND]
    # === 特殊图表 ===
    sankey: [FLOW]
    gantt: [FLOW]
    node: [GRAPH]
  
  chart_forbidden_themes:
    candlestick: [insurance, accounting_reporting, payments_fintech, ma_ipos]
    ohlc: [insurance, accounting_reporting, payments_fintech, ma_ipos]
    bollinger_bands: [insurance, accounting_reporting, payments_fintech]
    ichimoku_cloud: [insurance, accounting_reporting]
    renko: [insurance, accounting_reporting]
    point_figure: [insurance, accounting_reporting]
    # 🆕 成交量图表禁止的主题（外汇/加密货币数据没有成交量）
    candlestick_volume: [fx_trade, digital_assets, insurance, accounting_reporting]
    volume_profile: [fx_trade, digital_assets, insurance, accounting_reporting]
    market_depth: [fx_trade, digital_assets, insurance, accounting_reporting]
  
  style_forbidden_themes:
    trading: [insurance, accounting_reporting, esg_sustainable]
    fintech: [risk_regulation, accounting_reporting]
  
  style_forbidden_charts:
    fintech: [candlestick, ohlc, contour, heatmap_scatter]
    corporate: [candlestick, ohlc, bollinger_bands, ichimoku_cloud]

