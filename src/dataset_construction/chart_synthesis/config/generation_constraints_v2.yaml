# ============================================================================
# 图表类型 → 需要的指标类型映射
# 用于根据 chart_type 确定应该从 ohlc_indicators 还是 ts_indicators 选择
# ============================================================================
chart_indicator_type_mapping:
  # 需要 OHLC 数据的图表
  ohlc_required:
    - candlestick
    - candlestick_volume
    - ohlc
    - bollinger_bands
    - ichimoku_cloud
    - renko
    - point_figure
    - candlestick_indicator
    - volume_profile
    - market_depth
  
  # 使用时序数据的图表
  ts_preferred:
    - line
    - area
    - bar_line_overlay
    - line_band_overlay
    - fan_chart
    - errorbar
  
  # 可以使用合成数据的图表
  synthetic_allowed:
    - bar
    - histogram
    - scatter
    - heatmap
    - waterfall
    - box
    - pie
    - treemap
    - contour
    - radar
    - density
    - heatmap_scatter

