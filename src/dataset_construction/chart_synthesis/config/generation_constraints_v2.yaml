# 生成约束配置 v2
# 新增 theme_indicator_mapping，支持程序化数据选择
# 定义图表类型、主题、数据源、视觉风格、语言之间的适配关系和配额

# ============================================================================
# 语言配额
# ============================================================================
language_quota:
  zh-CN: 0.50  # 中文 50%
  en-US: 0.50  # 英文 50%

# ============================================================================
# 语言 × 数据源 亲和度
# 中文图表更多使用中国数据，英文图表更多使用美国数据
# ============================================================================
language_data_source_affinity:
  zh-CN:
    Baostock: 0.40  # 中文图表优先使用 Baostock（A股指数）
    yfinance: 0.25  # yfinance（港股/外汇）
    Synthetic: 0.20 # 合成数据（横截面）
    FRED: 0.15      # FRED（美国数据，中文标签）
  en-US:
    FRED: 0.35      # 英文图表优先使用 FRED（美国宏观数据）
    yfinance: 0.35  # yfinance（全球指数/外汇/商品）
    Synthetic: 0.20 # 合成数据
    Baostock: 0.10  # Baostock（A股指数，英文标签）

# ============================================================================
# 语言 × 主题 亲和度
# 某些主题更适合特定语言（中国市场数据 vs 美国市场数据）
# ============================================================================
language_theme_affinity:
  zh-CN:
    # 中国相关主题更适合中文
    equity_markets: 1.0   # A股、港股
    payments_fintech: 1.0 # 中国支付行业发达
    real_estate: 0.9      # 中国房地产
    # 美国主导的主题也可用中文
    macro_policy: 0.8
    inflation: 0.8
    default: 0.8
  en-US:
    # 美国/国际主题更适合英文
    macro_policy: 1.0     # 美联储政策
    fixed_income: 1.0     # 美债市场
    inflation: 1.0        # 美国CPI
    commodities: 0.9      # 国际大宗商品
    fx_trade: 0.9         # 外汇市场
    esg_sustainable: 0.9  # ESG是国际标准
    default: 0.8

# ============================================================================
# 视觉风格配额
# ============================================================================
visual_style_quota:
  trading: 0.15      # 交易终端风格 - 适合交易类主题
  quant: 0.15        # 量化学术风格 - 适合分析类主题
  macro: 0.12        # 宏观国际组织风格 - 适合宏观类主题
  news: 0.12         # 新闻财经风格 - 通用
  corporate: 0.12    # 企业财报风格 - 适合企业类主题
  fintech: 0.10      # Fintech App风格 - 适合消费金融类
  regulator: 0.12    # 监管央行风格 - 适合政策/风险类主题
  research: 0.12     # 机构研究报告风格 - 通用

# ============================================================================
# 数据源配额（已移除 AKShare 和 Efinance）
# ============================================================================
data_source_quota:
  FRED: 0.25        # 美国宏观经济数据
  Baostock: 0.20    # A股指数OHLC（无限流、稳定）
  yfinance: 0.30    # 全球指数/外汇/商品OHLC（Yahoo Finance）
  Synthetic: 0.25   # 合成数据（横截面/受限主题）- 调整到 25%

# ============================================================================
# 图表类型 × 主题 适配矩阵
# 值: 1.0=完美匹配, 0.5=一般适配, 0.0=不适合
# ============================================================================
chart_theme_affinity:
  # Tier 1 图表
  line:
    default: 1.0
  
  candlestick:
    equity_markets: 1.0
    fx_trade: 1.0
    commodities: 0.9
    digital_assets: 0.8
    derivatives: 0.7
    default: 0.0
  
  candlestick_volume:
    equity_markets: 1.0
    commodities: 0.8
    fx_trade: 0.0  # 🔧 修复: 外汇数据没有成交量
    digital_assets: 0.0  # 🔧 修复: 加密货币数据没有成交量
    default: 0.0
  
  bar:
    default: 0.9
    derivatives: 0.5
  
  area:
    default: 0.8
    corporate_finance: 0.5
  
  histogram:
    # 🔧 修复: 直方图展示数值分布，需要CS_1D数据，只有合成数据支持的主题才适合
    derivatives: 0.9  # 期权收益分布
    risk_regulation: 0.8  # 风险指标分布
    default: 0.0  # 其他主题禁止（没有合适的横截面分布数据）
  
  scatter:
    default: 0.7
    inflation: 0.9
    growth_employment: 0.9
    macro_policy: 0.9

  # Tier 2 图表
  heatmap:
    # 🔧 修复: 热力图需要MATRIX或CS_ND数据
    derivatives: 1.0  # 相关矩阵
    fx_trade: 0.8  # 货币对相关矩阵
    equity_markets: 0.8  # 行业相关矩阵
    fixed_income: 0.7  # 收益率曲线热力图
    default: 0.0  # 其他主题禁止（需要合成MATRIX数据支持）
  
  waterfall:
    # 🔧 修复: 瀑布图需要CS_1D递进结构数据（起点→增量→终点）
    corporate_finance: 1.0  # 财务分解（收入→成本→利润）
    fiscal_policy: 0.9  # 预算分解
    asset_management: 0.8  # 投资组合归因
    default: 0.0  # 其他主题禁止（没有递进结构数据）
  
  ohlc:
    equity_markets: 1.0
    fx_trade: 1.0
    commodities: 0.9
    default: 0.0
  
  bollinger_bands:
    equity_markets: 1.0
    fx_trade: 1.0
    commodities: 0.9
    digital_assets: 0.8
    default: 0.0
  
  box:
    # 🔧 修复: 箱线图需要CS_ND多组数据比较，只有支持合成数据的主题才适合
    growth_employment: 0.8  # 多国就业率对比
    derivatives: 0.7  # 多资产收益对比
    risk_regulation: 0.7  # 多银行风险指标对比
    default: 0.0  # 其他主题禁止（没有合适的多组横截面数据）
  
  pie:
    asset_management: 1.0
    corporate_finance: 0.9
    insurance: 0.8
    default: 0.4
  
  treemap:
    # 🔧 修复: 树状图需要CS_ND层级数据，只有特定主题适合
    asset_management: 1.0  # 资产组合分层
    equity_markets: 0.9  # 行业板块分层
    corporate_finance: 0.8  # 收入/成本构成
    default: 0.0  # 其他主题禁止（没有层级数据）

  # Tier 3 图表
  contour:
    # 🔧 修复: 等高线图需要MATRIX二维网格数据，只有极少数场景适合
    derivatives: 1.0  # 期权隐含波动率曲面
    fixed_income: 0.8  # 收益率曲线曲面
    default: 0.0  # 其他主题完全禁止（没有二维网格数据）
  
  volume_profile:
    equity_markets: 1.0
    commodities: 0.8
    fx_trade: 0.0  # 🔧 修复: 外汇数据没有成交量
    digital_assets: 0.0  # 🔧 修复
    default: 0.0
  
  ichimoku_cloud:
    equity_markets: 1.0
    fx_trade: 1.0
    commodities: 0.8
    default: 0.0
  
  renko:
    equity_markets: 1.0
    fx_trade: 0.9
    commodities: 0.8
    default: 0.0
  
  errorbar:
    growth_employment: 0.9
    inflation: 0.9
    macro_policy: 0.8
    default: 0.5
  
  radar:
    corporate_finance: 1.0
    asset_management: 0.9
    esg_sustainable: 0.9
    default: 0.5
  
  fan_chart:
    macro_policy: 1.0
    inflation: 0.9
    growth_employment: 0.8
    default: 0.4
  
  market_depth:
    equity_markets: 1.0
    commodities: 0.8
    fx_trade: 0.0  # 🔧 修复: 外汇数据没有成交量
    digital_assets: 0.0  # 🔧 修复: 加密货币数据没有成交量
    default: 0.0

  # Tier 4 图表
  point_figure:
    equity_markets: 1.0
    fx_trade: 0.9
    commodities: 0.8
    default: 0.0
  
  candlestick_indicator:
    equity_markets: 1.0
    fx_trade: 1.0
    commodities: 0.9
    default: 0.0
  
  density:
    derivatives: 0.9
    growth_employment: 0.8
    inflation: 0.8
    default: 0.5
  
  heatmap_scatter:
    # 🔧 修复: 散点热力图需要MATRIX或CS_ND二维分布数据
    derivatives: 0.9  # 期权希腊字母分布
    equity_markets: 0.7  # 股票风险收益分布
    default: 0.0  # 其他主题禁止（需要二维散点密度数据）

  bar_line_overlay:
    default: 0.8
    corporate_finance: 1.0
    macro_policy: 0.9
  
  line_band_overlay:
    default: 0.7
    macro_policy: 1.0
    inflation: 0.9

