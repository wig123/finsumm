themes:
  macro_policy:
    id: FT01
    label: 货币政策与央行
    label_en: Monetary Policy & Central Banking
    iptc:
    - monetary policy
    - central bank
    description: 政策利率、量化宽松/紧缩、央行资产负债表、前瞻性指引
    subtopics:
    - policy rate
    - QE/QT
    - balance sheet
    - forward guidance
    preferred_indicators:
    - macro.interest.rate.fed.funds
    - macro.interest.rate.10y.treasury
    indicator_prefixes:
    - macro.interest
    - macro.money
    - bond.treasury
    typical_data_sources:
    - FRED
    - Synthetic
    weight: 0.08
  fiscal_policy:
    id: FT02
    label: 财政政策与主权金融
    label_en: Fiscal Policy & Sovereign Finance
    iptc:
    - public finance
    - government budget
    - public debt
    description: 预算平衡、主权债券发行、财政刺激、政府支出
    subtopics:
    - budget balance
    - sovereign issuance
    - fiscal stimulus
    preferred_indicators:
    - macro.gdp.real
    - macro.gdp.nominal
    - bond.treasury.10y
    - bond.treasury.30y
    indicator_prefixes:
    # ✅ 修复：移除不存在的 china.macro.* 前缀
    - macro.gdp
    - bond.treasury
    - international.worldbank
    - international.imf
    typical_data_sources:
    - FRED
    weight: 0.07
  inflation:
    id: FT03
    label: 通胀与价格指数
    label_en: Inflation & Price Indices
    iptc:
    - inflation
    - consumer price
    - producer price
    description: CPI、PPI、核心通胀、通胀预期
    subtopics:
    - CPI
    - PPI
    - core inflation
    - inflation expectations
    preferred_indicators:
    - macro.inflation.cpi.headline
    - macro.inflation.cpi.core
    - macro.inflation.pce.headline
    - macro.inflation.pce.core
    - macro.inflation.ppi
    indicator_prefixes:
    # ✅ 修复：移除不存在的 china.macro.* 前缀
    - macro.inflation
    - commodity.food
    - commodity.agricultural
    - international.imf
    typical_data_sources:
    - FRED
    weight: 0.1
  growth_employment:
    id: FT04
    label: 增长、就业与生产力
    label_en: Growth, Employment & Productivity
    iptc:
    - economic growth
    - employment
    - productivity
    description: GDP、失业率、PMI/ISM、产出缺口
    subtopics:
    - GDP
    - unemployment
    - PMI/ISM
    - output gap
    preferred_indicators:
    - macro.gdp.real
    - macro.unemployment.rate
    - macro.employment.nonfarm
    - macro.industrial.production
    indicator_prefixes:
    # ✅ 修复：移除不存在的 china.macro.* 前缀
    - macro.gdp
    - macro.unemployment
    - macro.employment
    - macro.industrial
    - macro.capacity
    - macro.manufacturing
    - macro.leading
    - macro.coincident
    - china.stats
    - international.imf
    - international.worldbank
    typical_data_sources:
    - FRED
    weight: 0.08
  fx_trade:
    id: FT05
    label: 外汇与国际贸易
    label_en: FX & International Trade
    iptc:
    - foreign exchange
    - trade
    - balance of payments
    description: 汇率、经常账户、贸易差额
    subtopics:
    - exchange rates
    - current account
    - trade balance
    preferred_indicators:
    - fx.eurusd.ohlcv
    - fx.usdjpy.ohlcv
    - fx.gbpusd.ohlcv
    - fx.audusd.ohlcv
    - fx.usdcnh.ohlcv
    - fx.usdcad.ohlcv
    - fx.usdchf.ohlcv
    indicator_prefixes:
    - fx.
    typical_data_sources:
    - yfinance
    weight: 0.06
  equity_markets:
    id: FT06
    label: 权益市场
    label_en: Equity Markets
    iptc:
    - stock market
    - equity
    iso_10962:
    - E* Shares
    - C* Collective investment vehicles (equity)
    description: 指数、行业板块、估值、股息
    subtopics:
    - indices
    - sectors
    - valuation
    - dividends
    preferred_indicators:
    - market.index.sp500
    - market.index.nasdaq100
    - market.index.djia
    - market.index.wilshire5000
    - index.global.ftse.ohlcv
    - index.global.dax.ohlcv
    - index.global.n225.ohlcv
    - index.global.spx.ohlcv
    - index.global.ixic.ohlcv
    - index.sh000001.ohlcv
    - index.sz399001.ohlcv
    - index.sh000300.ohlcv
    - index.sz399006.ohlcv
    - index.hsi.ohlcv
    - index.hstech.ohlcv
