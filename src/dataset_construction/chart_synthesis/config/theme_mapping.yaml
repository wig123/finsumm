    # ✅ 修复：移除不存在的前缀（market.stock/market.sw/flow.*/reference.）
    - index.
    - market.index
    - market.volatility
    typical_data_sources:
    - FRED
    - yfinance
    - baostock
    weight: 0.1
  fixed_income:
    id: FT07
    label: 固定收益与货币市场
    label_en: Fixed Income & Money Markets
    iptc:
    - bond market
    - interest rates
    iso_10962:
    - D* Debt instruments
    - L* Money market
    description: 主权债、投资级债、高收益债、收益率曲线
    subtopics:
    - sovereign
    - investment-grade
    - high yield
    - yield curve
    preferred_indicators:
    - macro.interest.rate.10y.treasury
    - macro.interest.rate.fed.funds
    - bond.treasury.2y
    - bond.treasury.10y
    - bond.treasury.yield.spread.10y2y
    - bond.credit.spread.high.yield
    indicator_prefixes:
    # ✅ 修复：移除不存在的 market.bond 前缀
    - bond.
    - macro.interest
    - risk.financial
    typical_data_sources:
    - FRED
    weight: 0.08
  commodities:
    id: FT08
    label: 大宗商品与能源市场
    label_en: Commodities & Energy Markets
    iptc:
    - commodities
    - energy
    iso_10962:
    - T* Commodities (derivatives underlyings)
    description: 石油天然气、电力、金属、农产品
    subtopics:
