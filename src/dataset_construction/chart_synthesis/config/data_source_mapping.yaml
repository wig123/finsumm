# 数据源映射配置
# 将indicator_id映射到数据源特定的series_code

# ============================================================================
# FRED 数据源 - 美国宏观经济数据
# ============================================================================
fred:
  # === 通胀指标 ===
  macro.inflation.cpi.headline: CPIAUCSL
  macro.inflation.cpi.core: CPILFESL
  macro.inflation.pce.headline: PCEPI
  macro.inflation.pce.core: PCEPILFE
  macro.inflation.ppi: PPIACO

  # === GDP ===
  macro.gdp.real: GDPC1
  macro.gdp.nominal: GDP

  # === 就业市场 ===
  macro.unemployment.rate: UNRATE
  macro.employment.nonfarm: PAYEMS              # 非农就业人数
  macro.employment.claims.initial: ICSA         # 初请失业金人数
  macro.employment.claims.continued: CCSA       # 续请失业金人数
  macro.employment.participation: CIVPART       # 劳动参与率
  macro.employment.hourly.earnings: CES0500000003  # 平均时薪

  # === 利率 ===
  macro.interest.rate.fed.funds: FEDFUNDS
  macro.interest.rate.10y.treasury: GS10
  macro.interest.rate.prime: DPRIME             # 优惠贷款利率

  # === 生产与产能 ===
  macro.industrial.production: INDPRO           # 工业生产指数
  macro.capacity.utilization: TCU               # 产能利用率
  macro.manufacturing.orders: DGORDER           # 耐用品订单

  # === 消费者 ===
  macro.consumer.sentiment: UMCSENT             # 密歇根消费者信心指数
  macro.consumer.confidence: CSCICP03USM665S    # 消费者信心指数 (OECD)
  macro.retail.sales: RSAFS                     # 零售销售额
  macro.personal.consumption: PCE               # 个人消费支出

  # === 货币供应 ===
  macro.money.m1: M1SL                          # M1货币供应量
  macro.money.m2: M2SL                          # M2货币供应量
  macro.money.velocity: M2V                     # M2货币流通速度

  # === 房地产 ===
  macro.housing.starts: HOUST                   # 新屋开工
  macro.housing.permits: PERMIT                 # 建筑许可
  macro.housing.sales.new: HSN1F                # 新屋销售
  macro.housing.sales.existing: EXHOSLUSM495S   # 成屋销售
  realestate.house.price.index: CSUSHPISA       # Case-Shiller房价指数

  # === 领先/滞后指标 ===
  macro.leading.indicator: USALOLITONOSTSAM     # OECD领先指标
  macro.coincident.indicator: USPHCI            # 费城联储一致指标

  # === 能源商品 ===
  commodity.oil.wti: DCOILWTICO
  commodity.oil.brent: DCOILBRENTEU             # 布伦特原油
  commodity.gas.price: GASREGW
  commodity.gas.natural: DHHNGSP

  # === 农业食品 ===
  commodity.chicken.price: APU0000706111
  commodity.beef.price: APU0000703112
  commodity.agricultural.index: WPU02
  commodity.food.index: CPIUFDNS                # 食品CPI

  # === 金属矿产 ===
  commodity.metal.index: WPU101
  commodity.nonferrous.index: WPU102
  # 注意: 黄金价格可通过 Efinance 期货数据获取 (futures.au.ohlcv)

  # === 建筑材料 ===
  commodity.lumber.index: WPU081
  commodity.steel.index: PCU331331

  # === 波动率指数 ===
  market.volatility.vix: VIXCLS
  market.volatility.vix.3month: VXVCLS
  market.volatility.nasdaq100: VXNCLS
  market.volatility.djia: VXDCLS
  market.volatility.move: MOVE                  # MOVE债券波动率指数

  # === 国债收益率曲线 ===
  bond.treasury.1y: DGS1
  bond.treasury.2y: DGS2
  bond.treasury.5y: DGS5
  bond.treasury.20y: DGS20
  bond.treasury.30y: DGS30
  bond.treasury.yield.spread.10y2y: T10Y2Y
  bond.treasury.yield.spread.10y3m: T10Y3M      # 10年-3月利差

  # === 信用利差 ===
  bond.credit.spread.aaa: DAAA
  bond.credit.spread.baa: DBAA
  bond.credit.spread.high.yield: BAMLH0A0HYM2

  # === 风险指标 ===
  # TED利差(TEDRATE)和STLFSI2已停止更新，使用替代指标
  risk.financial.conditions: NFCI               # 芝加哥联储全国金融条件指数
  risk.financial.conditions.adj: ANFCI          # 芝加哥联储调整后金融条件指数
  risk.financial.stress.kc: KCFSI               # 堪萨斯城联储金融压力指数
  risk.corporate.default: DRSFRMACBS            # 企业违约率

  # === 美股市场指数 ===
  market.index.sp500: SP500
  market.index.djia: DJIA
  market.index.nasdaq100: NASDAQ100
  market.index.wilshire5000: WILL5000IND

  # === 国际股票市场 ===
  market.index.nikkei225: NIKKEI225
  market.index.msci.emerging: MSCIEF

