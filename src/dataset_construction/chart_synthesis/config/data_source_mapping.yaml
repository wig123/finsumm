  futures.ag.ohlcv: "115.AG0"       # 白银主力
  futures.cu.ohlcv: "115.CU0"       # 铜主力
  futures.al.ohlcv: "115.AL0"       # 铝主力
  futures.zn.ohlcv: "115.ZN0"       # 锌主力
  futures.ni.ohlcv: "115.NI0"       # 镍主力
  futures.rb.ohlcv: "115.RB0"       # 螺纹钢主力
  futures.sc.ohlcv: "115.SC0"       # 原油主力
  futures.if.ohlcv: "113.IF0"       # 沪深300期货主力
  futures.ic.ohlcv: "113.IC0"       # 中证500期货主力
  futures.ih.ohlcv: "113.IH0"       # 上证50期货主力

  # === ETF基金 OHLCV ===
  fund.etf.sh510050.ohlcv: "510050"   # 50ETF
  fund.etf.sh510300.ohlcv: "510300"   # 300ETF
  fund.etf.sh510500.ohlcv: "510500"   # 500ETF
  fund.etf.sz159915.ohlcv: "159915"   # 创业板ETF

# ============================================================================
# AKShare 数据源已移除
# ============================================================================
# 原因：
# 1. 性能瓶颈（严格限流、全局锁导致串行化）
# 2. 不需要数据的全面性，只需要多样性
# 3. FRED + yfinance + baostock + efinance 已提供足够多样性
# 4. 横截面数据由 LLM 合成生成
#
# 移除的数据：
# - 中国宏观经济（9个指标）→ 不影响多样性
# - 中国商品价格（6个指标）→ yfinance/efinance 替代
# - 资金流向（6个指标）→ 非核心需求
# - 期权数据（9个指标）→ 非核心需求
# - 横截面数据（15个指标）→ LLM 合成替代
#
# 替代方案：
# - 时间序列：FRED (100+指标) + yfinance (无限) + baostock + efinance
# - 横截面：LLM 合成（90%概率）+ Cross-sectional API（10%）

# ============================================================================
# 横截面数据源 - 国际组织/政府统计
# ============================================================================
cross_sectional:
  # === 国家统计局 ===
  china.stats.provinces.gdp:
    source: 国家统计局
    api_url: https://data.stats.gov.cn/easyquery.htm
    method: POST
    description: 省级GDP数据
  china.stats.provinces.population:
    source: 国家统计局
    description: 省级人口数据

  # === IMF (国际货币基金组织) ===
  international.imf.inflation:
    source: IMF
    api_url: https://www.imf.org/external/datamapper/api/v1/PCPIPCH
    description: 全球主要国家通胀率
  international.imf.gdp.growth:
    source: IMF
    api_url: https://www.imf.org/external/datamapper/api/v1/NGDP_RPCH
    description: 全球主要国家GDP增长率

  # === 世界银行 ===
  international.worldbank.gdp:
    source: 世界银行
    api_url: https://api.worldbank.org/v2/country/all/indicator/NY.GDP.MKTP.CD
    description: 全球主要国家GDP总量
  international.worldbank.population:
    source: 世界银行
    api_url: https://api.worldbank.org/v2/country/all/indicator/SP.POP.TOTL
    description: 全球主要国家人口

  # === FAOSTAT (联合国粮农组织) ===
  international.fao.crop.production:
    source: FAOSTAT
    api_url: https://fenixservices.fao.org/faostat/api/v1/en/data/QCL
    description: 中国主要农作物产量

