# 模拟数据触发条件配置
# 当满足以下条件时，有一定概率使用 LLM 生成模拟数据
#
# ============================================================================
# 核心原则：只合成数据点少的数据形态
# ============================================================================
# ✅ 适合合成：横截面(10-30个实体)、矩阵(10x10)、流向图(20条边)
# ❌ 不适合合成：时间序列(几百到几千个数据点)
#
# 原因：
# 1. 时间序列数据量大，LLM 生成几百行日期+数值不实际，容易出错
# 2. 真实时序数据源（FRED, yfinance, Baostock, Efinance）已经很丰富，优先使用真实数据
# 3. 横截面数据（多国比较、行业分布）真实数据难获取，适合合成
# ============================================================================

# 触发模式：any (满足任一条件即可能触发) / all (需满足所有条件才可能触发)
trigger_mode: any

triggers:
  # 1. 按数据形态触发
  # ⚠️ 重要：只包含数据点少的形态，不包含时间序列！
  by_shape:
    enabled: true
    probability: 0.9  # 满足条件后有 90% 概率使用模拟数据
    shapes:
      # ✅ 适合合成的形态（数据点少）
      - CS_1D    # 单变量横截面（如：10国GDP对比，~10个数据点）
      - CS_ND    # 多变量横截面（如：10国多指标雷达图，~10x5=50个数据点）
      - MATRIX   # 矩阵数据（如：相关性热力图，10x10=100个数据点）
      - FLOW     # 流向数据（如：桑基图，~20条边）
      - GRAPH    # 图/网络数据（如：关系图，~20个节点）
      # ❌ 不触发合成的形态（数据点多，由真实数据源提供）
      # - TS_1D   # 单变量时序（如：5年日线，~1000+个数据点）
      # - TS_ND   # 多变量时序（如：多指标对比，~1000+个数据点）
      # - TS_OHLC # OHLC金融时序（如：K线图，~500+个数据点）
  
  # 2. 按主题触发
  # 数据有限的主题使用模拟数据
  by_theme:
    enabled: true
    probability: 0.8  # 满足条件后有 80% 概率使用模拟数据
    themes:
      - corporate_finance      # 企业财务（2个指标）
      - accounting_reporting   # 会计审计（2个指标）
      - insurance              # 保险精算（3个指标）
      - payments_fintech       # 支付金融科技（3个指标）
      - ma_ipos                # 并购IPO（4个指标）
      - esg_sustainable        # ESG可持续（6个指标）
  
  # 3. 按图表类型触发
  # 需要特殊数据结构的图表类型（仅包含 chart_library_mapping.yaml 中定义的）
  by_chart_type:
    enabled: true
    probability: 1.0  # 这些图表类型 100% 使用模拟数据（因为真实数据源不支持）
    chart_types:
      - treemap              # 层级结构
      - waterfall            # 增量分解

# 模拟数据生成配置
generation:
  # 默认实体数量（如果 DataSpec 未指定）
  default_entity_count:
    CS_1D: 10
    CS_ND: 8
    MATRIX: 10
    FLOW: 6
    GRAPH: 8
  
  # 默认变量数量（如果 DataSpec 未指定）
  default_variable_count:
    CS_ND: 4
    MATRIX: 5
    radar: 5

