# 视觉风格注意事项配置
# 用自然语言描述风格特征，给代码生成模型适度的创作空间
# 8种金融图表视觉风格，独立于内容主题(theme)，可自由组合

trading:
  title: "交易终端 / 技术分析风 (Trading Terminal Style)"
  reference: "Bloomberg Terminal, TradingView, 专业交易软件界面"
  notes:
    - "整体氛围：紧张、实时、信息密集。像交易员盯盘时看到的界面"
    - "背景：深色背景（深黑、深灰、深蓝均可），营造专注的交易室氛围"
    - "网格：清晰可见的网格线，帮助用户对齐价位和时间，是功能性元素"
    - "配色：高对比度的霓虹感颜色，在深色背景上醒目跳跃。绿色代表涨/买，红色代表跌/卖"
    - "文字颜色：深色背景下，所有文字（标题、坐标轴标签、刻度标签、图例）使用浅色（如霓虹绿、亮白、浅灰），确保可见"
    - "图表颜色：深色背景下，数据线条/柱线/OHLC柱使用高对比度颜色（如霓虹绿、橙红），确保与背景区分"
    - "刻度颜色：建议用 `ax.tick_params(axis='both', colors='浅色')` 设置刻度为浅色"
    - "线条：细而密集，可以多指标叠加，边缘锐利不要圆角"
    - "字体：等宽字体优先，字号偏小但信息量大，数字和标签简写高效"
    - "布局：高密度，几乎没有浪费的空白，所有空间都承载信息"
    - "避免：柔和低饱和度的配色、大量留白、装饰性元素"

quant:
  title: "量化 / 学术金融风 (Quantitative/Academic Style)"
  reference: "学术论文附图, Jupyter Notebook 输出, arXiv 金融论文"
  notes:
    - "整体氛围：冷静、严谨、可复现。像能直接放进学术论文的图表"
    - "背景：白底或极浅灰底，打印友好"
    - "网格：极淡或完全没有，不喧宾夺主"
    - "配色：黑灰为主，最多一两个强调色（如统计学常用的蓝色、红色）。几乎没有品牌色概念"
    - "线条：较细，误差带和置信区间用半透明浅色填充"
    - "字体：Serif 或干净的无衬线字体，可使用希腊字母和数学符号"
    - "标题：中立客观，不下结论，像变量名一样严谨"
    - "布局：常见 small multiples（多个小图并排），留白适中"
    - "避免：鲜艳霓虹色、装饰性渐变、夸张的视觉效果"

macro:
  title: "宏观 / 多国比较风 (Macro/International Org Style)"
  reference: "IMF World Economic Outlook, 世界银行报告, OECD 统计图表"
  notes:
    - "整体氛围：官方、平衡、可引用。像国际组织发布的权威报告"
    - "背景：干净的白底，大量留白，给人稳重专业的印象"
    - "网格：极淡的细网格线，帮助读数但不显眼"
    - "配色：沉稳的机构蓝色调为主，多系列时色调统一和谐，避免刺眼"
    - "文字：所有文字深色，与白底形成清晰对比"
    - "线条：中等粗细，干净利落"
    - "标题：客观陈述事实，不带主观判断或情绪化表达"
    - "布局：适合多国/多指标的矩阵式比较，整体排版规整像统计年鉴"
    - "注意：时间序列数据点多时，优先用折线图而非柱状图"
    - "避免：3D 效果、阴影、过于鲜艳的颜色"

news:
  title: "新闻财经 / 媒体图表风 (News Graphics Style)"
  reference: "Financial Times, The Economist, Bloomberg News 的新闻图表"
  notes:
    - "整体氛围：叙事性强、简洁、有品牌气质。一图讲一个故事"
    - "背景：可以有品牌特色（如 FT 的温暖米色调、Economist 的干净白底）"
    - "配色：颜色体系高度统一，有辨识度，像媒体品牌色"
    - "线条：简洁大方，线宽适中偏粗，小尺寸下也清晰"
    - "标题 (重要)：推荐使用结论型标题，一眼告诉读者故事重点"
    - "  ✓ 好标题示例：'美国工资增速放缓至两年最低'"
    - "  ✗ 差标题示例：'美国工资增速 (2020-2024)'"
    - "注释：喜欢用 callout 标注关键转折点，而不是堆砌图例"
    - "布局：单图信息量适中，适合独立截图在社交媒体传播"
    - "避免：过于学术化的标题、信息过载"

corporate:
  title: "企业财报 / IR / FP&A 风 (Corporate/FP&A Style)"
  reference: "上市公司财报, 投资者关系演示文稿, 管理层汇报 PPT"
  notes:
    - "整体氛围：业务导向、结构清晰、适合汇报。像给董事会看的图表"
    - "背景：白底或浅灰，PPT/报告常见的干净风格"
    - "配色：公司品牌主色搭配中性灰，强调结构而非精确数值"
    - "图形：喜欢块状元素（条形、瀑布图、矩形卡片），可适度使用圆角和轻微阴影"
    - "字体：字号较大，适合会议投影"
    - "标题：总结句式，如 '收入同比增长 18%'，喜欢突出关键数字"
    - "布局：每页 1-2 个图，配文字说明关键 takeaway"
    - "避免：密集的坐标网格、过于学术的表达"

fintech:
  title: "消费者金融 / Fintech App 风 (Consumer Fintech Style)"
  reference: "支付宝理财页面, Robinhood, Revolut 等金融 App 界面"
  notes:
    - "整体氛围：轻松、好玩、情绪化。让用户感觉理财很简单"
    - "背景：浅色或柔和渐变，APP UI 风格"
    - "配色：活泼明亮，可用渐变和品牌色块，绿/红暗示盈亏但整体偏可爱"
    - "图形：大量圆角，卡片化设计，坐标轴和网格常被弱化或省略"
    - "字体：大字号显示关键数字（资产、收益），辅助文字很少"
    - "语言：直接友好，可以口语化，甚至可用 emoji"
    - "布局：大量留白和呼吸感，单屏内容不要太多"
    - "避免：过于严肃专业的表达、信息密集的布局"

regulator:
  title: "监管 / 中央银行中性风 (Regulatory/Central Bank Style)"
  reference: "美联储金融稳定报告, 央行货币政策报告, 银保监会统计图表"
  notes:
    - "整体氛围：克制、客观、不煽情。像能放进政策文件的图表"
    - "背景：白底，干净简洁"
    - "网格：淡但存在，帮助精确读值"
    - "配色：极度克制，主要用蓝色和灰色，少量红色表示风险。整体色调静音(muted)"
    - "线条：粗细适中，不会过多重叠，对异常点只做适度标注"
    - "标题：只陈述事实，如 '图 3：商业银行不良贷款率'，不做渲染"
    - "图注：往往写得很长，详细说明定义、数据来源和局限性"
    - "布局：单图配详细文字说明，看起来安静、可信赖"
    - "避免：夸张的颜色或标记、惊叹号、情绪化表达、强烈渐变"

research:
  title: "机构研究报告风 (Sell-side/Buy-side Research Style)"
  reference: "券商研究报告, 基金公司研报, 卖方分析师报告"
  notes:
    - "整体氛围：统一模板、批量产出、专业高效。像券商研报里的标准化图表"
    - "背景：白底，网格极淡或只有轴线"
    - "配色：机构主色（通常是红色或蓝色）为主线条/柱子，灰色为次要元素"
    - "特点：所有图表颜色体系几乎一样，方便整份报告风格统一"
    - "线条：略粗，保证打印后清晰，视觉简洁不加多余装饰"
    - "字体：中文报告常用微软雅黑配 Arial"
    - "图注：格式化标注，如 '单位：亿元；数据来源：公司公告'"
    - "布局 (重要)：高度标准化的版式，固定尺寸，左下时间轴，右侧可能有次坐标"
    - "避免：过于个性化的设计、不统一的配色"

# 默认风格（不指定时使用）
default:
  title: "默认专业风格 (Default Professional Style)"
  reference: "通用的专业金融图表"
  notes:
    - "整体氛围：简洁、专业、通用。适合大多数金融图表场景"
    - "背景：白底或浅灰底"
    - "配色：简洁的主色加 1-2 个辅助色，避免过于鲜艳或暗淡"
    - "线条：粗细适中，保持简洁"
    - "字体：清晰易读的无衬线字体"
    - "标题：描述性，不过度解读"
    - "布局：适度留白，突出数据本身"
