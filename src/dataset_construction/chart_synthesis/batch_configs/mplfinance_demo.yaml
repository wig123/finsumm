# mplfinance图表库批量测试
# 专注于金融技术分析图表类型

batch_name: "mplfinance_demo"
output_base_dir: "./batch_output"

execution:
  parallel: true
  max_workers: 3  # 减少并发数,避免API限流
  use_process_pool: false

charts:
  # === Tier 1: 核心K线图表 ===

  # 1. 基础K线图 - 中文
  - chart_type: candlestick
    language: zh-CN
    theme: commodities
    task: monitor
    data_constraints: {}

  # 2. 基础K线图 - 英文
  - chart_type: candlestick
    language: en-US
    theme: commodities
    task: monitor
    data_constraints: {}

  # 3. 带成交量K线图 - 中文
  - chart_type: candlestick_volume
    language: zh-CN
    theme: commodities
    task: explain
    data_constraints: {}

  # 4. 带成交量K线图 - 英文
  - chart_type: candlestick_volume
    language: en-US
    theme: commodities
    task: explain
    data_constraints: {}

  # === Tier 2: OHLC和技术指标 ===

  # 5. OHLC条形图 - 中文
  - chart_type: ohlc
    language: zh-CN
    theme: commodities
    task: monitor
    data_constraints: {}

  # 6. 布林带图表 - 英文
  - chart_type: bollinger_bands
    language: en-US
    theme: commodities
    task: diagnose
    data_constraints: {}
