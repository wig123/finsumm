# 全面测试配置 - 100张图表
# 覆盖所有主题、图表类型、语言、任务的组合
# 用法: python scripts/run_batch.py --config batch_configs/comprehensive_100.yaml

batch_name: "comprehensive_100"
output_base_dir: "./batch_output"

# 执行配置
execution:
  parallel: true
  max_workers: 5
  use_process_pool: false
  use_async: true

# 图表列表 (100张)
charts:
  # === Tier 1: 核心类型测试 (40张) ===

  # Line Charts (8张)
  - {chart_type: line, language: zh-CN, theme: macro_policy, library: matplotlib}
  - {chart_type: line, language: en-US, theme: inflation, library: seaborn}
  - {chart_type: line, language: zh-CN, theme: growth_employment, library: plotly}
  - {chart_type: line, language: en-US, theme: fx_trade, library: altair}
  - {chart_type: line, language: zh-CN, theme: equity_markets, library: bokeh}
  - {chart_type: line, language: en-US, theme: fixed_income, library: matplotlib}
  - {chart_type: line, language: zh-CN, theme: commodities, library: seaborn}
  - {chart_type: line, language: en-US, theme: digital_assets, library: plotly}

  # Bar Charts (8张)
  - {chart_type: bar, language: zh-CN, theme: fiscal_policy, library: matplotlib}
  - {chart_type: bar, language: en-US, theme: banking_credit, library: seaborn}
  - {chart_type: bar, language: zh-CN, theme: corporate_finance, library: plotly}
  - {chart_type: bar, language: en-US, theme: real_estate, library: altair}
  - {chart_type: bar, language: zh-CN, theme: insurance, library: bokeh}
  - {chart_type: bar, language: en-US, theme: asset_management, library: matplotlib}
  - {chart_type: bar, language: zh-CN, theme: derivatives, library: seaborn}
  - {chart_type: bar, language: en-US, theme: esg_sustainable, library: plotly}

  # Candlestick Charts (6张)
  - {chart_type: candlestick, language: zh-CN, theme: equity_markets, library: mplfinance}
  - {chart_type: candlestick, language: en-US, theme: commodities, library: plotly}
  - {chart_type: candlestick, language: zh-CN, theme: fx_trade, library: mplfinance}
  - {chart_type: candlestick, language: en-US, theme: digital_assets, library: plotly}
  - {chart_type: candlestick, language: zh-CN, theme: derivatives, library: mplfinance}
  - {chart_type: candlestick, language: en-US, theme: equity_markets, library: plotly}

  # Area Charts (6张)
  - {chart_type: area, language: zh-CN, theme: inflation, library: matplotlib}
  - {chart_type: area, language: en-US, theme: growth_employment, library: seaborn}
  - {chart_type: area, language: zh-CN, theme: fixed_income, library: plotly}
  - {chart_type: area, language: en-US, theme: banking_credit, library: altair}
  - {chart_type: area, language: zh-CN, theme: real_estate, library: bokeh}
  - {chart_type: area, language: en-US, theme: corporate_finance, library: matplotlib}

  # Histogram (4张)
  - {chart_type: histogram, language: zh-CN, theme: equity_markets, library: matplotlib}
  - {chart_type: histogram, language: en-US, theme: fx_trade, library: seaborn}
  - {chart_type: histogram, language: zh-CN, theme: commodities, library: plotly}
  - {chart_type: histogram, language: en-US, theme: derivatives, library: altair}

  # Scatter Charts (4张)
  - {chart_type: scatter, language: zh-CN, theme: inflation, library: matplotlib}
  - {chart_type: scatter, language: en-US, theme: growth_employment, library: seaborn}
