# 覆盖统计:
# - 图表类型: 27 种（所有 Tier 1-4）
# - 主题: 20 个（FT01-FT20）
# - 语言: 中文/英文 各 50 张
# - 任务: monitor/compare/diagnose/explain 均衡分布
# - 库: matplotlib, seaborn, plotly, mplfinance, altair, bokeh
