# 视觉风格测试配置 - 100张图表
# 测试新增的8种视觉风格 + style_notes.yaml
# 用法: python scripts/run_batch.py --config batch_configs/style_test_100.yaml

batch_name: "style_test_100"
output_base_dir: "./batch_output"

# 执行配置
execution:
  parallel: true
  max_workers: 5
  use_process_pool: false
  use_async: true

# 图表列表 (100张)
# 每种风格约12-13张，覆盖不同图表类型和主题
charts:
  # === trading 风格 (12张) - 交易终端/技术分析 ===
  - {chart_type: candlestick, language: zh-CN, theme: equity_markets, library: mplfinance, visual_style: trading}
  - {chart_type: candlestick, language: en-US, theme: fx_trade, library: plotly, visual_style: trading}
  - {chart_type: candlestick_volume, language: zh-CN, theme: commodities, library: mplfinance, visual_style: trading}
  - {chart_type: ohlc, language: en-US, theme: equity_markets, library: plotly, visual_style: trading}
  - {chart_type: bollinger_bands, language: zh-CN, theme: digital_assets, library: mplfinance, visual_style: trading}
  - {chart_type: ichimoku_cloud, language: en-US, theme: fx_trade, library: plotly, visual_style: trading}
  - {chart_type: line, language: zh-CN, theme: equity_markets, library: matplotlib, visual_style: trading}
  - {chart_type: renko, language: en-US, theme: commodities, library: mplfinance, visual_style: trading}
  - {chart_type: volume_profile, language: zh-CN, theme: equity_markets, library: plotly, visual_style: trading}
  - {chart_type: market_depth, language: en-US, theme: digital_assets, library: plotly, visual_style: trading}
  - {chart_type: candlestick_indicator, language: zh-CN, theme: equity_markets, library: mplfinance, visual_style: trading}
  - {chart_type: area, language: en-US, theme: commodities, library: plotly, visual_style: trading}

  # === quant 风格 (12张) - 量化/学术 ===
