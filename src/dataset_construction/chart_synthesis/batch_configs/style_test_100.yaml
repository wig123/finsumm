  - {chart_type: scatter, language: zh-CN, theme: inflation, library: seaborn, visual_style: quant}
  - {chart_type: histogram, language: en-US, theme: equity_markets, library: matplotlib, visual_style: quant}
  - {chart_type: box, language: zh-CN, theme: growth_employment, library: seaborn, visual_style: quant}
  - {chart_type: density, language: en-US, theme: derivatives, library: seaborn, visual_style: quant}
