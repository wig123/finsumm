# 综合测试配置 - 30张多样化图表
# 测试不同主题、不同库、不同语言、不同图表类型
# 用法: python scripts/run_batch.py --config batch_configs/comprehensive_test.yaml

batch_name: "comprehensive_test"
output_base_dir: "./batch_output"

# 执行配置
execution:
  parallel: true          # 并行执行
  max_workers: 10         # 最大并发数
  use_process_pool: false # 使用线程池(进程池需要代码重构以支持序列化)
  use_async: true         # 使用异步IO (真正的并发,推荐)

# 图表列表 (30张)
charts:
  # === matplotlib 库测试 (10张) ===

  # 1. 宏观政策 - 中文折线图
  - chart_type: line
    language: zh-CN
    theme: macro_policy
    library: matplotlib
    data_constraints: {}

  # 2. 通胀 - 英文柱状图
  - chart_type: bar
    language: en-US
    theme: inflation
    library: matplotlib
    data_constraints: {}

  # 3. 增长就业 - 中文散点图
  - chart_type: scatter
    language: zh-CN
    theme: growth_employment
    library: matplotlib
    data_constraints: {}

  # 4. 外汇交易 - 英文折线图
  - chart_type: line
    language: en-US
    theme: fx_trade
    library: matplotlib
    data_constraints: {}

  # 5. 股票市场 - 中文柱状图
  - chart_type: bar
    language: zh-CN
    theme: equity_markets
    library: matplotlib
    data_constraints: {}

  # 6. 固定收益 - 英文散点图
  - chart_type: scatter
