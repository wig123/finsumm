# 全面测试配置 - 1000张图表 (时间序列优先)
# 覆盖所有主题、图表类型、语言、视觉风格的组合
# 用法: python scripts/run_batch.py --config batch_configs/comprehensive_1000.yaml
#
# 图表类型分布 (时间序列优先 75%):
#   ⏱️ 时间序列图表: 750张 (75%)
#      - line/area/line_band_overlay: 255张
#      - candlestick/candlestick_volume/ohlc: 240张
#      - bollinger_bands/ichimoku/renko/point_figure: 165张
#      - bar_line_overlay/volume_profile/fan_chart: 90张
#   📊 其他图表: 250张 (25%)
#      - bar/histogram/scatter/heatmap/box: 135张
#      - pie/bubble/waterfall/treemap: 55张
#      - contour/radar/sankey/node: 60张
#
# 语言分布: 中文/英文 各约50%
# 视觉风格: 8种风格均衡覆盖
# 主题分布: 金融时序主题优先

batch_name: comprehensive_1000
output_base_dir: ./batch_output
execution: {parallel: true, max_workers: 5, use_process_pool: false, use_async: true}
charts:
- {chart_type: bar, language: zh-CN, theme: fixed_income, library: plotly, visual_style: colorful}
- {chart_type: bollinger_bands, language: zh-CN, theme: fx_trade, library: mplfinance,
  visual_style: dark_professional}
- {chart_type: pie, language: zh-CN, theme: esg_sustainable, library: matplotlib,
  visual_style: dark_professional}
