### Qwen3-VL-8B LoRA SFT 配置
### EXP-013: LoRA Rank 512 (继续增加模型容量)

### 模型配置
model_name_or_path: /app/models/qwen3-vl-8b-instruct
trust_remote_code: true
flash_attn: fa2

### 数据配置
dataset: all_train
eval_dataset: all_val
template: qwen3_vl_nothink
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8

### 训练阶段
stage: sft
do_train: true
do_eval: true

### 微调方式: LoRA
finetuning_type: lora
lora_rank: 512
lora_alpha: 1024
lora_dropout: 0.05
lora_target: all

### 训练超参数
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
num_train_epochs: 5
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 1.0

### 精度与加速
bf16: true
gradient_checkpointing: true
ddp_find_unused_parameters: false
deepspeed: /app/configs/ds_zero2.json

### 日志与保存
logging_strategy: steps
logging_steps: 5
eval_strategy: steps
eval_steps: 80
save_strategy: steps
save_steps: 80
save_total_limit: 5

### 输出目录
output_dir: /app/outputs/exp-013
run_name: exp-013_rank512

### 监控 (W&B 使用 WANDB_MODE=offline 离线模式)
report_to:
  - tensorboard
  - wandb
