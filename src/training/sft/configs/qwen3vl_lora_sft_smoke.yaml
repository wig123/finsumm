### Qwen3-VL-8B LoRA SFT Smoke Test 配置
### 用于快速验证环境和数据格式

### 模型配置
model_name_or_path: /app/models/qwen3-vl-8b-instruct
trust_remote_code: true

### 数据配置（使用少量样本）
dataset_dir: /app/data
dataset: finmme_train
eval_dataset: finmme_val
template: qwen3_vl
cutoff_len: 2048
max_samples: 16          # 只用 16 条样本做 smoke test
overwrite_cache: true
preprocessing_num_workers: 4

### 训练阶段
stage: sft
do_train: true
do_eval: true

### 微调方式: LoRA
finetuning_type: lora
lora_rank: 8             # 降低 rank 加速测试
lora_alpha: 16
lora_dropout: 0.05
lora_target: all

### 训练超参数（最小化配置）
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
num_train_epochs: 1
max_steps: 20            # 只跑 20 步
learning_rate: 1.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.1

### 精度与加速
bf16: true
gradient_checkpointing: true
ddp_find_unused_parameters: false

### 日志与保存
logging_strategy: steps
logging_steps: 5
eval_strategy: steps
eval_steps: 10
save_strategy: steps
save_steps: 10
save_total_limit: 1

### 输出目录
output_dir: /app/outputs/qwen3vl_smoke_test
run_name: qwen3vl_smoke_test

### 监控
report_to: tensorboard
